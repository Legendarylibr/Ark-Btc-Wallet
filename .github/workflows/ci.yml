name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=moderate
      - run: npm run lint
      - run: npm test
      - run: npm run build
        env:
          SESSION_SECRET: ci-test-session-secret-min-32-chars-long
          BARKD_AUTH_TOKEN: ci-test-barkd-auth-token-placeholder

  lean-fv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run fv:extract
      - run: git diff --exit-code lean/ArkWallet/FvFixtures.lean
      - uses: leanprover/lean-action@v1
        with:
          lake-package-directory: lean
          auto-config: "false"
          build: "true"
          test: "false"
          lint: "false"

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          SESSION_SECRET: ci-test-session-secret-min-32-chars-long
          BARKD_AUTH_TOKEN: ci-test-barkd-auth-token-placeholder
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          CI: "true"
          SESSION_SECRET: ci-test-session-secret-min-32-chars-long
          BARKD_AUTH_TOKEN: ci-test-barkd-auth-token-placeholder
