[package]
name = "bark-ffi-wasm"
description = "This is a simple wrapper crate which re-exports bark-ffi as needed for wasm bindings."
version = "0.1.0-beta.8"
edition = "2021"
license = "MIT OR Apache-2.0"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = ["debug"]
debug = ["console_error_panic_hook"]

[dependencies]
bark-ffi = { path = "../../../bark-ffi", default-features = false, features = ["wasm-web"] }

# Compatibility to compile to WASM
getrandom = { version = "0.2.16", features = ["js"] }

# Debug dependencies
log = { version = "0.4.27", features = [ "kv", "kv_serde" ] }
console_log = "1"
console_error_panic_hook = { version = "0.1.7", optional = true }
wasm-bindgen = "0.2"

[dev-dependencies]
wasm-bindgen-test = "0.3.50"
console_error_panic_hook = "0.1.7"

[profile.release]
# Tell `rustc` to optimize for small code size.
opt-level = "z"
lto = true
codegen-units = 1
# panic = "abort"  # Disabled for debugging - re-enable for production
strip = true

[package.metadata.wasm-pack.profile.release]
wasm-opt = ["-Oz", "--enable-bulk-memory", "--enable-nontrapping-float-to-int"]
